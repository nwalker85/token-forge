name: ravenhelm-operational-black
version: 2.0.0
description: Heimdall-aligned operational UI grammar for Runestack

primitives:
  color:
    black_0: "#050508"
    black_1: "#0A0A0A"
    black_2: "#171717"
    neutral_1: "#262626"
    neutral_2: "#404040"
    neutral_3: "#737373"
    text_1: "#FAFAFA"
    text_2: "#A3A3A3"
    blue_1: "#3B82F6"
    blue_2: "#60A5FA"
    green_1: "#10B981"
    amber_1: "#F59E0B"
    red_1: "#EF4444"
    violet_1: "#8B5CF6"
  spacing:
    "0": 0
    "1": 2
    "2": 4
    "3": 6
    "4": 8
    "5": 12
    "6": 16
    "7": 20
    "8": 24
    "9": 32
    "10": 40
  radii:
    none: 0
    sm: 4
    md: 6
    lg: 8
    xl: 8
    full: 999
  typography:
    family:
      sans: Inter
      mono: JetBrains Mono
    scale:
      title: { size: 24, weight: 700, line_height: 32, letter_spacing: 0 }
      heading: { size: 18, weight: 600, line_height: 26, letter_spacing: 0 }
      body: { size: 14, weight: 400, line_height: 20, letter_spacing: 0 }
      body_sm: { size: 12, weight: 400, line_height: 16, letter_spacing: 0 }
      label: { size: 12, weight: 500, line_height: 16, letter_spacing: 0 }
      mono: { size: 13, weight: 400, line_height: 18, letter_spacing: 0 }
  shadow:
    none: []
    sm:
      - { x: 0, y: 1, blur: 2, spread: 0, color: "rgba(0,0,0,0.35)" }
    md:
      - { x: 0, y: 8, blur: 24, spread: 0, color: "rgba(0,0,0,0.28)" }
  effects:
    glass_subtle:
      background: "rgba(10,10,10,0.78)"
      border: "rgba(255,255,255,0.07)"
      blur: 8
    glow_blue_subtle:
      color: "rgba(59,130,246,0.20)"
      blur: 20

roles:
  surface:
    canvas: "{primitives.color.black_0}"
    panel: "{primitives.color.black_1}"
    card: "{primitives.color.black_1}"
    card_muted: "{primitives.color.black_2}"
    sidebar: "{primitives.color.black_2}"
    rail: "{primitives.color.black_1}"
    overlay: "{primitives.color.black_1}"
    input: "{primitives.color.black_1}"
  text:
    primary: "{primitives.color.text_1}"
    secondary: "{primitives.color.text_2}"
    muted: "{primitives.color.neutral_3}"
    inverse: "{primitives.color.black_1}"
  border:
    subtle: "rgba(255,255,255,0.06)"
    default: "{primitives.color.neutral_1}"
    strong: "{primitives.color.neutral_2}"
    focus: "{primitives.color.blue_1}"
  action:
    primary:
      background: "{primitives.color.blue_1}"
      foreground: "{primitives.color.text_1}"
      hover: "{primitives.color.blue_2}"
    secondary:
      background: "{primitives.color.black_2}"
      foreground: "{roles.text.primary}"
      border: "{roles.border.default}"
    ghost:
      background: transparent
      foreground: "{roles.text.secondary}"
      hover_background: "{primitives.color.black_2}"
    destructive:
      background: "{primitives.color.red_1}"
      foreground: "{primitives.color.text_1}"
  status:
    success: "{primitives.color.green_1}"
    warning: "{primitives.color.amber_1}"
    error: "{primitives.color.red_1}"
    info: "{primitives.color.blue_1}"
  data:
    chart_1: "{primitives.color.blue_1}"
    chart_2: "{primitives.color.green_1}"
    chart_3: "{primitives.color.amber_1}"
    chart_4: "{primitives.color.violet_1}"
    chart_5: "{primitives.color.red_1}"

states:
  interaction:
    default: { opacity: 1 }
    hover: { surface_delta: 1 }
    active: { surface_delta: 2 }
    focus: { border: "{roles.border.focus}", ring: "rgba(59,130,246,0.30)" }
    selected: { background: "{roles.surface.card_muted}", border: "{roles.border.focus}" }
    disabled: { opacity: 0.5 }
  agent:
    idle: { color: "{roles.text.muted}", label: Idle }
    thinking: { color: "{roles.status.info}", label: Thinking }
    planning: { color: "{roles.status.info}", label: Planning }
    running: { color: "{roles.status.success}", label: Running }
    blocked: { color: "{roles.status.warning}", label: Blocked }
    failed: { color: "{roles.status.error}", label: Failed }
    complete: { color: "{roles.status.success}", label: Complete }
  contract:
    offering: { color: "{roles.status.info}", label: Offering }
    pending: { color: "{roles.status.warning}", label: Pending }
    accepted: { color: "{roles.status.success}", label: Accepted }
    refused: { color: "{roles.status.error}", label: Refused }
    active: { color: "{roles.status.success}", label: Active }
    expired: { color: "{roles.text.muted}", label: Expired }
    voided: { color: "{roles.text.muted}", label: Voided }
  governance:
    compliant: { color: "{roles.status.success}", label: Compliant }
    at_risk: { color: "{roles.status.warning}", label: At Risk }
    violated: { color: "{roles.status.error}", label: Violated }
    escalated: { color: "{roles.status.error}", label: Escalated }
  memory:
    recalled: { color: "{roles.status.info}", label: Recalled }
    proposed: { color: "{roles.status.warning}", label: Proposed }
    stale: { color: "{roles.status.warning}", label: Stale }
    conflict: { color: "{roles.status.error}", label: Conflict }
  tool:
    available: { color: "{roles.status.success}", label: Available }
    running: { color: "{roles.status.info}", label: Running }
    failed: { color: "{roles.status.error}", label: Failed }
    destructive: { color: "{roles.status.warning}", label: Destructive }
  runtime:
    online: { color: "{roles.status.success}", label: Online }
    busy: { color: "{roles.status.info}", label: Busy }
    degraded: { color: "{roles.status.warning}", label: Degraded }
    offline: { color: "{roles.status.error}", label: Offline }

density:
  compact:
    control_height: 32
    card_padding: 12
    row_height: 36
    gap: 8
  comfortable:
    control_height: 36
    card_padding: 16
    row_height: 44
    gap: 12
  spacious:
    control_height: 44
    card_padding: 20
    row_height: 52
    gap: 16

components:
  button:
    default_density: compact
    variants:
      primary:
        background: "{roles.action.primary.background}"
        foreground: "{roles.action.primary.foreground}"
        border: transparent
        radius: "{primitives.radii.md}"
        height: "{density.compact.control_height}"
        padding_x: "{primitives.spacing.5}"
      secondary:
        background: "{roles.action.secondary.background}"
        foreground: "{roles.action.secondary.foreground}"
        border: "{roles.action.secondary.border}"
        radius: "{primitives.radii.md}"
      ghost:
        background: transparent
        foreground: "{roles.action.ghost.foreground}"
        hover_background: "{roles.action.ghost.hover_background}"
  input:
    background: "{roles.surface.input}"
    foreground: "{roles.text.primary}"
    placeholder: "{roles.text.muted}"
    border: "{roles.border.default}"
    focus_border: "{roles.border.focus}"
    radius: "{primitives.radii.md}"
    height: "{density.compact.control_height}"
  card:
    background: "{roles.surface.card}"
    foreground: "{roles.text.primary}"
    border: "{roles.border.default}"
    radius: "{primitives.radii.lg}"
    padding: "{density.compact.card_padding}"
    shadow: "{primitives.shadow.none}"
  table:
    background: "{roles.surface.card}"
    header_background: "{roles.surface.card_muted}"
    border: "{roles.border.default}"
    row_height: "{density.compact.row_height}"
    hover_background: "{roles.surface.card_muted}"
  sidebar:
    background: "{roles.surface.sidebar}"
    foreground: "{roles.text.secondary}"
    active_background: "{roles.surface.card_muted}"
    active_foreground: "{roles.text.primary}"
    border: "{roles.border.default}"
  rail:
    background: "{roles.surface.rail}"
    border: "{roles.border.default}"
    width:
      compact: 320
      comfortable: 380
  chat_message:
    user_background: "{roles.surface.card_muted}"
    agent_background: "{roles.surface.card}"
    tool_background: "{roles.surface.card}"
    border: "{roles.border.default}"
  metric_tile:
    background: "{roles.surface.card}"
    border: "{roles.border.default}"
    value_typography: "{primitives.typography.scale.heading}"
  event_timeline:
    line: "{roles.border.default}"
    marker_default: "{roles.text.muted}"
    marker_active: "{roles.status.info}"

projections:
  css:
    prefix: "--rh-"
  tailwind:
    prefix: rh
  loki:
    compatibility: v1
